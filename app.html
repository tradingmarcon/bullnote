// Simple SVG chart components (no external deps)
function SimpleLineChart({data, height=180, T={}}){
  const h2 = typeof height==='number' ? height : 200;
  const [tooltip, setTooltip]    = React.useState(null);
  const [viewRange, setViewRange] = React.useState([0,1]);
  const dragRef = React.useRef(null);
  const svgRef  = React.useRef(null);

  // Non-passive wheel listener — must be registered AFTER all hooks
  React.useEffect(()=>{
    const el = svgRef.current;
    if(!el) return;
    const handler = (e)=>{
      e.preventDefault();
      const factor=e.deltaY>0?1.15:0.87;
      setViewRange(prev=>{
        const [s,en]=prev;
        const center=(s+en)/2;
        const half=Math.min(0.5,((en-s)*factor)/2);
        const ns=Math.max(0,center-half);
        const ne=Math.min(1,center+half);
        return (ne-ns>0.04)?[ns,ne]:prev;
      });
      setTooltip(null);
    };
    el.addEventListener('wheel', handler, {passive:false});
    return ()=>el.removeEventListener('wheel', handler);
  },[]);

  // Early return AFTER all hooks
  if(!data||data.length<2) return <div style={{height:h2,display:'flex',alignItems:'center',justifyContent:'center',color:'#4a5568',fontSize:16}}>No data yet</div>;

  const [vStart,vEnd] = viewRange;
  const totalN = data.length;
  const iStart = Math.max(0, Math.floor(vStart*(totalN-1)));
  const iEnd   = Math.min(totalN-1, Math.ceil(vEnd*(totalN-1)));
  const visible = data.slice(iStart, iEnd+1);

  const vals = visible.map(d=>d.pnl);
  const min=Math.min(...vals), max=Math.max(...vals), range=max-min||1;
  const W=600, H=h2;
  const pts = visible.map((d,i)=>({
    x:(i/(visible.length-1||1))*W,
    y:H-((d.pnl-min)/range)*(H-24)-12,
    pnl:d.pnl, tradePnl:d.tradePnl, date:d.date,
    symbol:d.symbol, strategy:d.strategy, tradeN:d.i
  }));
  const polyPts = pts.map(p=>p.x+','+p.y).join(' ');
  const zeroYRaw = H-((0-min)/range)*(H-24)-12;
  const zeroY    = Math.max(0, Math.min(H, zeroYRaw));
  const showZero = zeroYRaw >= 0 && zeroYRaw <= H;
  const fmtC = v=>(v>=0?'+':'')+v.toLocaleString('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0});
  const fmtD = d=>{ if(!d) return ''; const p=d.split('-'); return p.length===3?`${p[2]}/${p[1]}`:d; };

  const onMove = (e)=>{
    if(dragRef.current) return;
    const svg=svgRef.current; if(!svg) return;
    const rect=svg.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const idx=Math.max(0,Math.min(pts.length-1,Math.round(((cx-rect.left)/rect.width)*(pts.length-1))));
    setTooltip({pt:pts[idx],idx,right:idx>pts.length*0.6});
  };

  const onWheel = (e)=>{
    e.preventDefault();
    const factor=e.deltaY>0?1.15:0.87;
    const [s,en]=viewRange;
    const center=(s+en)/2;
    const half=Math.min(0.5,((en-s)*factor)/2);
    const ns=Math.max(0,center-half);
    const ne=Math.min(1,center+half);
    if(ne-ns>0.04) setViewRange([ns,ne]);
    setTooltip(null);
  };

  const onMouseDown=(e)=>{
    if(e.button!==0) return;
    dragRef.current={startX:e.clientX,startRange:[...viewRange]};
    e.preventDefault();
  };
  const onMouseMoveHandler=(e)=>{
    if(!dragRef.current){ onMove(e); return; }
    const dx=e.clientX-dragRef.current.startX;
    const rect=svgRef.current?.getBoundingClientRect();
    if(!rect) return;
    const span=dragRef.current.startRange[1]-dragRef.current.startRange[0];
    const shift=-(dx/rect.width)*span;
    const ns=Math.max(0,dragRef.current.startRange[0]+shift);
    const ne=Math.min(1,ns+span);
    setViewRange(ne-span<0?[0,span]:[ns,ne]);
    setTooltip(null);
  };
  const onMouseUp=()=>{ dragRef.current=null; };

  const isZoomed=vEnd-vStart<0.99;
  const tp=tooltip?.pt;

  return (
    <div style={{position:'relative',userSelect:'none'}}
      onMouseLeave={()=>{setTooltip(null);dragRef.current=null;}}
      onMouseUp={onMouseUp}
    >
      <div style={{position:'absolute',top:4,right:6,zIndex:20,display:'flex',gap:6,alignItems:'center'}}>
        {isZoomed&&<button onClick={()=>setViewRange([0,1])} style={{background:'#1E293B',border:'1px solid #334155',borderRadius:6,color:'#94A3B8',fontSize:11,fontWeight:700,padding:'3px 10px',cursor:'pointer',fontFamily:'inherit'}}>Reset</button>}
        <span style={{fontSize:10,color:'#334155',fontWeight:600,pointerEvents:'none'}}>
          {isZoomed?`${iStart+1}–${iEnd+1} / ${totalN}`:"🔍 scroll·drag"}
        </span>
      </div>

      <div style={{overflow:'hidden',borderRadius:4}}>
        <svg ref={svgRef} width="100%" height={h2} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none"
          style={{overflow:'visible',cursor:dragRef.current?'grabbing':'crosshair',display:'block'}}
          onMouseMove={onMouseMoveHandler} onMouseDown={onMouseDown}
          onTouchStart={e=>{e.preventDefault();onMove(e);}} onTouchMove={e=>{e.preventDefault();onMove(e);}}
        >
          {showZero&&<line x1={0} y1={zeroY} x2={W} y2={zeroY} stroke="#334155" strokeDasharray="4,4" strokeWidth={1}/>}
          <polyline points={polyPts} fill="none" stroke="#22C55E" strokeWidth={2.5} strokeLinejoin="round"/>
          {tp&&<line x1={tp.x} y1={0} x2={tp.x} y2={H} stroke="#22C55E" strokeWidth={1} strokeDasharray="3,3" opacity={0.3}/>}
        </svg>
      </div>

      {tp&&<div style={{position:'absolute',pointerEvents:'none',left:`${(tp.x/W)*100}%`,top:`${(tp.y/h2)*100}%`,transform:'translate(-50%,-50%)',width:9,height:9,borderRadius:'50%',background:'#22C55E',border:'2px solid #0F172A',boxShadow:'0 0 0 3px #22C55E40',zIndex:10}}/>}

      {tp&&(
        <div style={{position:'absolute',pointerEvents:'none',zIndex:30,
          top:tp.y/h2<0.5?'55%':'2%',
          left:tooltip.right?'auto':'50%',right:tooltip.right?'0':'auto',
          transform:tooltip.right?'none':'translateX(-50%)',
          background:'rgba(8,15,30,0.97)',
          border:`1px solid ${tp.pnl>=0?'#22c55e50':'#ef444450'}`,
          borderRadius:12,padding:'12px 16px',minWidth:200,
          boxShadow:'0 16px 40px rgba(0,0,0,0.6)'
        }}>
          <div style={{fontSize:11,color:'#475569',fontWeight:600,marginBottom:10,textTransform:'uppercase',letterSpacing:'0.06em'}}>📅 {fmtD(tp.date)} · Trade #{tp.tradeN}</div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:20,marginBottom:6}}>
            <span style={{fontSize:12,color:'#475569'}}>{T.thisTrade||'This trade'}</span>
            <span style={{fontSize:15,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",color:(tp.tradePnl||0)>=0?'#22c55e':'#ef4444'}}>{fmtC(tp.tradePnl||0)}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:20,marginBottom:10}}>
            <span style={{fontSize:12,color:'#475569'}}>{T.cumTotal||'Cumulative'}</span>
            <span style={{fontSize:20,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif",color:tp.pnl>=0?'#22c55e':'#ef4444'}}>{fmtC(tp.pnl)}</span>
          </div>
          {(tp.symbol||tp.strategy)&&(
            <div style={{borderTop:'1px solid #1e2d45',paddingTop:8,display:'flex',gap:6,flexWrap:'wrap'}}>
              {tp.symbol&&<span style={{fontSize:11,background:'#1E293B',color:'#22C55E',borderRadius:6,padding:'2px 8px',fontWeight:700}}>{tp.symbol}</span>}
              {tp.strategy&&<span style={{fontSize:11,background:'#1E293B',color:'#94A3B8',borderRadius:6,padding:'2px 8px'}}>{tp.strategy}</span>}
            </div>
          )}
        </div>
      )}

      {(()=>{
        const step=Math.ceil(visible.length/6);
        const idxs=[];
        for(let i=0;i<visible.length;i+=step) idxs.push(i);
        if(idxs[idxs.length-1]!==visible.length-1) idxs.push(visible.length-1);
        return(
          <div style={{display:'flex',justifyContent:'space-between',marginTop:4,paddingLeft:2,paddingRight:2}}>
            {idxs.map(i=>{
              const d=visible[i]; if(!d) return null;
              const p=(d.date||'').split('-');
              return <span key={i} style={{fontSize:11,color:'#475569',fontWeight:600}}>{p.length===3?`${p[2]}/${p[1]}`:d.date||''}</span>;
            })}
          </div>
        );
      })()}
    </div>
  );
}


function SimpleBarChart({data, height=180, colorFn, T={}}){
  const h2 = typeof height==='number'?height:180;
  const [tooltip, setTooltip] = React.useState(null);

  if(!data||!data.length) return <div style={{height:h2,display:'flex',alignItems:'center',justifyContent:'center',color:'#4a5568',fontSize:16}}>No data yet</div>;

  const vals = data.map(d=>d.pnl||d.count||0);
  const absMax = Math.max(...vals.map(Math.abs),1);
  const fmtC = v=>(v>=0?'+':'')+v.toLocaleString('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0});
  const fmtD = d=>{ if(!d) return ''; const p=d.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d; };

  const td   = tooltip!=null ? data[tooltip.idx] : null;
  const tval = td ? (td.pnl||td.count||0) : 0;
  const tc   = td ? (colorFn?colorFn(td,tooltip.idx):(tval>=0?'#22c55e':'#ef4444')) : '#22c55e';
  const tipW = 190;
  const tipLeft = tooltip ? Math.min(tooltip.x - tipW/2, (typeof window!=='undefined'?window.innerWidth:800) - tipW - 12) : 0;
  const tipTop  = tooltip ? Math.max(tooltip.y - 120, 8) : 0;

  return (
    <div style={{display:'flex',alignItems:'flex-end',gap:2,height:h2,padding:'0 4px',position:'relative'}}
      onMouseLeave={()=>setTooltip(null)}
    >
      {data.map((d,i)=>{
        const val   = d.pnl||d.count||0;
        const pct   = Math.abs(val)/absMax*100;
        const color = colorFn?colorFn(d,i):(val>=0?'#22c55e':'#ef4444');
        const active= tooltip?.idx===i;
        return (
          <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'100%',gap:3,cursor:'pointer'}}
            onMouseEnter={e=>setTooltip({idx:i,x:e.clientX,y:e.clientY})}
            onMouseMove={e=>tooltip?.idx===i&&setTooltip({idx:i,x:e.clientX,y:e.clientY})}
            onTouchStart={e=>{e.stopPropagation();const r=e.touches[0];setTooltip(p=>p?.idx===i?null:{idx:i,x:r.clientX,y:r.clientY});}}
          >
            <div style={{width:'100%',height:pct+'%',background:color,opacity:active?1:0.7,borderRadius:'3px 3px 0 0',minHeight:val?2:0,transition:'all 0.15s',boxShadow:active?`0 0 10px ${color}50`:'none'}}/>
            <div style={{fontSize:10,color:active?color:'#4a5568',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:'100%',textAlign:'center',fontWeight:active?700:400,transition:'color 0.15s'}}>{d.date||d.label||''}</div>
          </div>
        );
      })}

      {tooltip!=null && td && (
        <div style={{
          position:'fixed',zIndex:9999,pointerEvents:'none',
          left:tipLeft,top:tipTop,
          background:'rgba(8,15,30,0.97)',
          border:`1px solid ${tc}50`,
          borderRadius:12,padding:'12px 16px',minWidth:tipW,
          boxShadow:'0 16px 40px rgba(0,0,0,0.7)',whiteSpace:'nowrap'
        }}>
          {(td.fullDate||td.date)?(
            <div style={{fontSize:11,color:'#475569',fontWeight:600,marginBottom:8,textTransform:'uppercase',letterSpacing:'0.06em'}}>
              📅 {fmtD(td.fullDate||td.date)}
            </div>
          ):(
            <div style={{fontSize:11,color:'#475569',fontWeight:600,marginBottom:8}}>{td.label}</div>
          )}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:20,marginBottom:6}}>
            <span style={{fontSize:12,color:'#475569'}}>{td.pnl!=null?(T.dailyPnl||'Daily P&L'):'Trades'}</span>
            <span style={{fontSize:20,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif",color:tc}}>
              {td.pnl!=null?fmtC(tval):tval}
            </span>
          </div>
          {td.count!=null&&(
            <div style={{borderTop:'1px solid #1e2d45',paddingTop:6,marginTop:2,fontSize:12,color:'#475569'}}>
              {T.tradeCount?T.tradeCount(td.count):`${td.count} trade${td.count!==1?'s':''}`}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function fmt(n) {
  if (n===undefined||n===null||n==="") return "—";
  return (n>=0?"+$":"-$") + Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0});
}

function calcMetrics(trades) {
  if (!trades.length) return {winRate:0,profitFactor:0,avgWin:0,avgLoss:0,totalPnl:0,totalTrades:0,maxDrawdown:0,bestStrategy:"-",stratFollowedRate:0,avgRating:0,disciplineScore:0};
  const wins = trades.filter(t=>t.actualPnl>0);
  const losses = trades.filter(t=>t.actualPnl<0);
  const totalWins = wins.reduce((s,t)=>s+t.actualPnl,0);
  const totalLoss = Math.abs(losses.reduce((s,t)=>s+t.actualPnl,0));
  const totalPnl = trades.reduce((s,t)=>s+t.actualPnl,0);
  const winRate = wins.length/trades.length*100;
  const profitFactor = totalLoss===0?totalWins:totalWins/totalLoss;
  const avgWin = wins.length?totalWins/wins.length:0;
  const avgLoss = losses.length?totalLoss/losses.length:0;
  const stratFollowedRate = trades.filter(t=>t.strategyFollowed==="Yes").length/trades.length*100;
  const stopRespectedTrades = trades.filter(t=>t.stopRespected!==undefined&&t.stopRespected!==null&&t.stopRespected!=="");
  const stopRespectedRate = stopRespectedTrades.length ? stopRespectedTrades.filter(t=>t.stopRespected==="Yes").length/stopRespectedTrades.length*100 : null;
  let peak=0,cumPnl=0,maxDD=0;
  for (const t of trades){cumPnl+=t.actualPnl;if(cumPnl>peak)peak=cumPnl;const dd=peak-cumPnl;if(dd>maxDD)maxDD=dd;}
  const stratPnl={};
  trades.forEach(t=>{if(!stratPnl[t.strategy])stratPnl[t.strategy]=0;stratPnl[t.strategy]+=t.actualPnl;});
  const bestStrategy=Object.entries(stratPnl).sort((a,b)=>b[1]-a[1])[0]?.[0]||"-";
    const rated=trades.filter(t=>t.tradeRating>0);
  const avgRating=rated.length?rated.reduce((s,t)=>s+(t.tradeRating||0),0)/rated.length:0;
  const planScore=stratFollowedRate;
  const stopScore=stopRespectedRate!==null ? stopRespectedRate : (losses.length===0?100:(()=>{
    const bad=losses.filter(t=>{const stop=parseFloat(t.stopPrice)||0,entry=parseFloat(t.entryPrice)||0,contracts=parseFloat(t.contracts)||1;const maxL=stop>0&&entry>0?Math.abs(stop-entry)*contracts*50:0;return maxL>0&&Math.abs(t.actualPnl)>maxL*1.15;});
    return Math.max(0,100-(bad.length/losses.length)*100);
  })());
  const ratingScore=avgRating>0?(avgRating/5)*100:planScore;
  const disciplineScore=Math.round((planScore+stopScore+ratingScore)/3);
  return {winRate,profitFactor,avgWin,avgLoss,totalPnl,totalTrades:trades.length,maxDrawdown:maxDD,bestStrategy,stratFollowedRate,stopRespectedRate,avgRating,disciplineScore};
}

async function fetchYahooBatchAll(){
  const syms = YAH_SYMS.map(d=>d.yah).join(",");
  const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(syms)}&fields=regularMarketChangePercent,regularMarketPrice,regularMarketPreviousClose`;
  
  const attempts = [
    ()=>fetch(url, {signal:AbortSignal.timeout(6000), headers:{"Accept":"application/json"}}),
    ...PROXIES.map(p=>()=>fetch(p(url), {signal:AbortSignal.timeout(7000)}))
  ];
  for(const attempt of attempts){
    try{
      const r = await attempt();
      if(!r.ok) continue;
      const j = await r.json();
      const results = j?.quoteResponse?.result || j?.result || [];
      if(!results.length) continue;
      const out = {};
      results.forEach(q=>{
        const def = YAH_SYMS.find(d=>d.yah===q.symbol);
        if(!def) return;
        let pct = q.regularMarketChangePercent;
        if(pct==null && q.regularMarketPrice && q.regularMarketPreviousClose && q.regularMarketPreviousClose!==0){
          pct = ((q.regularMarketPrice - q.regularMarketPreviousClose)/q.regularMarketPreviousClose)*100;
        }
        if(pct!=null) out[def.name] = pct;
      });
      if(Object.keys(out).length > 0) return out;
    }catch(e){}
  }
  return null;
}

async function fetchFinnhubSingle(sym){
  try{
    const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${FINNHUB_KEY}`, {signal:AbortSignal.timeout(5000)});
    if(!r.ok) return null;
    const j = await r.json();
    if(!j || !j.c) return null;
    if(j.dp!=null) return j.dp;
    if(j.pc && j.pc!==0) return ((j.c-j.pc)/j.pc)*100;
  }catch(e){}
  return null;
}

async function loadAllMarketData(setData){
  const now = Date.now();
  
  const allFresh = YAH_SYMS.every(d=>_mktCache[d.name] && now-_mktCache[d.name].ts < CACHE_TTL);
  if(allFresh){
    const cached = {};
    YAH_SYMS.forEach(d=>{ cached[d.name]=_mktCache[d.name].pct; });
    setData(cached);
    return;
  }

  
  const yahooData = await fetchYahooBatchAll();
  if(yahooData && Object.keys(yahooData).length >= 10){
    // Good batch result — update cache and state
    Object.entries(yahooData).forEach(([k,v])=>{ _mktCache[k]={pct:v,ts:now}; });
    setData(prev=>({...prev,...yahooData}));

    
    const missing = YAH_SYMS.filter(d=>yahooData[d.name]==null);
    for(const d of missing){
      const fhSym = FH_FALLBACK[d.name];
      if(!fhSym) continue;
      await new Promise(r=>setTimeout(r,350));
      const pct = await fetchFinnhubSingle(fhSym);
      if(pct!=null){
        _mktCache[d.name]={pct,ts:now};
        setData(prev=>({...prev,[d.name]:pct}));
      }
    }
    return;
  }

  
  console.warn("Yahoo batch failed, using Finnhub fallback");
  for(const d of YAH_SYMS){
    const fhSym = FH_FALLBACK[d.name];
    if(!fhSym) continue;
    
    if(_mktCache[d.name] && now-_mktCache[d.name].ts < CACHE_TTL){
      setData(prev=>({...prev,[d.name]:_mktCache[d.name].pct}));
      continue;
    }
    await new Promise(r=>setTimeout(r,350));
    const pct = await fetchFinnhubSingle(fhSym);
    if(pct!=null){
      _mktCache[d.name]={pct,ts:now};
      setData(prev=>({...prev,[d.name]:pct}));
    }
  }
}

function CalendarView({trades, C, T}){
  const today = new Date();
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth());

  const monthNames = (T&&T.calMonths) || ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const dayNames = (T&&T.calDays) || ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  
  const dayMap = useMemo(()=>{
    const m = {};
    trades.forEach(t=>{
      if(!t.date) return;
      const d = t.date.slice(0,10);
      if(!m[d]) m[d] = {pnl:0, count:0};
      m[d].pnl += (parseFloat(t.actualPnl)||0);
      m[d].count += 1;
    });
    return m;
  }, [trades]);

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();

  function prevMonth(){ if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else{setViewMonth(m=>m-1);} }
  function nextMonth(){ if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else{setViewMonth(m=>m+1);} }

  const cells = [];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const todayStr = today.toISOString().slice(0,10);

  
  const monthTrades = trades.filter(t=>t.date&&t.date.startsWith(`${viewYear}-${String(viewMonth+1).padStart(2,'0')}`));
  const monthPnl = monthTrades.reduce((s,t)=>s+(parseFloat(t.actualPnl)||0),0);
  const monthWins = monthTrades.filter(t=>t.actualPnl>0).length;

  return (
    <div>
      {/* Month header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,padding:"16px 22px",background:C.card,border:`1px solid ${C.border}`,borderRadius:16}}>
        <button onClick={prevMonth} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,cursor:"pointer",padding:"8px 18px",fontSize:16,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:26,fontWeight:800,color:C.text,fontFamily:"'Barlow Condensed',sans-serif"}}>{monthNames[viewMonth]} {viewYear}</div>
          <div style={{fontSize:13,color:C.muted,marginTop:4}}>
            {(T&&T.tradeCount)?T.tradeCount(monthTrades.length):(monthTrades.length+" trades")} &nbsp;·&nbsp;
            <span style={{color:monthPnl>=0?C.green:C.red,fontWeight:700}}>{monthPnl>=0?"+$":"-$"}{Math.abs(monthPnl).toLocaleString("en-US",{maximumFractionDigits:0})}</span>
            &nbsp;·&nbsp; {monthWins}{(T&&T.calWin)||"V"} / {monthTrades.length-monthWins}{(T&&T.calLoss)||"D"}
          </div>
        </div>
        <button onClick={nextMonth} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,cursor:"pointer",padding:"8px 18px",fontSize:16,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>›</button>
      </div>

      {/* Calendar grid */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>
        {/* Day headers */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:`1px solid ${C.border}`}}>
          {dayNames.map(d=>(
            <div key={d} style={{padding:"12px 0",textAlign:"center",fontSize:13,fontWeight:700,color:C.muted}}>{d}</div>
          ))}
        </div>

        {/* Day cells */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
          {cells.map((day,i)=>{
            if(!day) return <div key={`e${i}`} style={{minHeight:90,borderRight:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,background:C.bg,opacity:0.3}}/>;

            const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            const data = dayMap[dateStr];
            const isToday = dateStr===todayStr;
            const isPositive = data && data.pnl > 0;
            const isNegative = data && data.pnl < 0;

            return (
              <div key={day} style={{
                minHeight:90,
                borderRight:`1px solid ${C.border}`,
                borderBottom:`1px solid ${C.border}`,
                padding:"10px 12px",
                background: isPositive?`${C.green}12`:isNegative?`${C.red}10`:C.card,
                position:"relative",
                transition:"background 0.2s",
                borderLeft: isToday?`3px solid ${C.accent}`:undefined,
              }}>
                <div style={{
                  fontSize:14,fontWeight:700,
                  color:isToday?C.accent:C.muted,
                  marginBottom:6
                }}>{day}</div>
                {data && (<>
                  <div style={{
                    fontSize:15,fontWeight:800,
                    color:isPositive?C.green:C.red,
                    fontFamily:"'Barlow Condensed',sans-serif",
                    lineHeight:1.2,
                    marginBottom:3
                  }}>{isPositive?"+$":"-$"}{Math.abs(data.pnl).toLocaleString("en-US",{maximumFractionDigits:0})}</div>
                  <div style={{fontSize:11,color:C.muted}}>{(T&&T.tradeCount)?T.tradeCount(data.count):(data.count+(data.count!==1?" trades":" trade"))}</div>
                </>)}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

        </div>
      )}
      <style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}`}</style>
    </div>
  );
}

function AccountModal({C, currentUser, onClose, onLogout, lang, userPhotoURL, onPhotoChange, userUsername}){
  const labels = {
    pt:{ title:"Minha Conta", profileTab:"Perfil", securityTab:"Segurança",
      name:"Nome de exibição", email:"Email", newEmail:"Novo email",

      emailSent:"✅ Link de confirmação enviado! Verifique sua caixa de entrada.",
      changePwd:"Alterar senha", currentPwd:"Senha atual", newPwd:"Nova senha", confirmPwd:"Confirmar nova senha",
      save:"Salvar alterações", saveEmail:"Enviar confirmação", logout:"Sair da conta",
      success:"Alterações salvas!", reauthMsg:"Por segurança, confirme sua senha atual antes de continuar.",
      pwdMismatch:"As senhas não coincidem.", pwdShort:"Mínimo 6 caracteres.",

    es:{ title:"Mi Cuenta", profileTab:"Perfil", securityTab:"Seguridad",

      emailInfo:"Se enviará un enlace de confirmación al nuevo email.",
      emailSent:"✅ ¡Enlace enviado! Revisa tu bandeja de entrada.",
      changePwd:"Cambiar contraseña", currentPwd:"Contraseña actual", newPwd:"Nueva contraseña", confirmPwd:"Confirmar contraseña",
      save:"Guardar cambios", saveEmail:"Enviar confirmación", logout:"Cerrar sesión",
      success:"¡Cambios guardados!", reauthMsg:"Por seguridad, confirma tu contraseña actual antes de continuar.",
      pwdMismatch:"Las contraseñas no coinciden.", pwdShort:"Mínimo 6 caracteres.",
      photoLabel:"Foto de perfil", changePhoto:"Cambiar foto", uploading:"Subiendo...",

    en:{ title:"My Account", profileTab:"Profile", securityTab:"Security",

      emailSent:"✅ Confirmation link sent! Check your inbox.",

      save:"Save changes", saveEmail:"Send confirmation", logout:"Sign out",

  const [tab, setTab]             = React.useState("profile");

  const [showCurr, setShowCurr]   = React.useState(false);
  const [showNew, setShowNew]     = React.useState(false);
  const [localUsername, setLocalUsername] = React.useState(userUsername||"");
  const fileRef = React.useRef(null);

  // Generate username for pre-existing accounts that don't have one yet
  React.useEffect(()=>{
    if(localUsername) return;
    if(!currentUser) return;
    async function ensureUsername(){
      try{
        // Read directly from user's own profile (always permitted)
        const profileSnap = await window.fsGetDocs(
          window.fsCollection(window.db, `users/${currentUser.uid}/settings`)
        );
        let existingUsername = null;
        profileSnap.forEach(d=>{ if(d.id==="profile" && d.data().username) existingUsername = d.data().username; });
        if(existingUsername){ setLocalUsername(existingUsername); return; }

        // Generate new username — format: firstname_xxxxx (5 random a-z0-9)
        const base = (currentUser.displayName||currentUser.email||"trader")
          .split(/[\s@]/)[0].toLowerCase().replace(/[^a-z0-9]/g,"").slice(0,12)||"trader";
        const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
        let suffix = "";
        for(let j=0;j<5;j++) suffix += chars[Math.floor(Math.random()*chars.length)];
        const username = `${base}_${suffix}`;

        // Save to user's own profile first (always works)
        await window.fsSetDoc(window.fsDoc(window.db,`users/${currentUser.uid}/settings`,"profile"),
          {username},{merge:true});

        // Try to save to global usernames collection (may fail if rules not set — that's ok)
        try{
          await window.fsSetDoc(window.fsDoc(window.db,"usernames",username),{
            username, email:currentUser.email, uid:currentUser.uid, createdAt:Date.now()
          });
        }catch(e){ /* Firestore rules may not allow this yet — username still works for display */ }

        setLocalUsername(username);
      }catch(e){ console.error("Username gen error:",e); }
    }
    ensureUsername();
  },[currentUser?.uid]);

  async function reauth(password){
    const cred = window.fbEmailAuthProvider.credential(currentUser.email, password);
    await window.fbReauth(currentUser, cred);
  }

  async function uploadPhoto(file){
    if(!file) return;
    const validTypes = ["image/jpeg","image/png","image/webp","image/gif"];
    if(!validTypes.includes(file.type)){ setMsg({type:"error",text:"Use JPG, PNG, WEBP ou GIF."}); return; }
    if(file.size > 5*1024*1024){ setMsg({type:"error",text:"Imagem muito grande. Máximo 5MB."}); return; }
    setPhotoUploading(true); setMsg(null);
    try{
      // Resize + compress via canvas (max 256px, JPEG 80%)
      const dataUrl = await new Promise((res,rej)=>{
        const reader = new FileReader();
        reader.onerror = rej;
        reader.onload = ev => {
          const img = new Image();
          img.onerror = rej;
          img.onload = ()=>{
            const MAX = 256;
            const scale = Math.min(MAX/img.width, MAX/img.height, 1);
            const w = Math.round(img.width * scale);
            const h = Math.round(img.height * scale);
            const canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            res(canvas.toDataURL("image/jpeg", 0.80));
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });
      // Save ONLY to Firestore — Firebase Auth photoURL has a size limit so we skip it
      await window.fsSetDoc(
        window.fsDoc(window.db, `users/${currentUser.uid}/settings`, "profile"),
        { photoURL: dataUrl },
        { merge: true }
      );
      setPhotoURL(dataUrl);
      onPhotoChange(dataUrl);
      setMsg({type:"success", text:L.success});
    }catch(e){
      console.error("Photo error:", e);
      setMsg({type:"error", text:"Erro: " + (e?.message || "tente novamente.")});
    }
    setPhotoUploading(false);
  }

  async function saveProfile(){
    setLoading(true); setMsg(null);
    try{
      await window.fbUpdateProfile(currentUser, {displayName: displayName.trim()||null});
      // Also save to Firestore so it syncs across all devices
      await window.fsSetDoc(
        window.fsDoc(window.db, `users/${currentUser.uid}/settings`, "profile"),
        { displayName: displayName.trim()||null },
        { merge: true }
      );
      setMsg({type:"success", text:L.success});
    }catch(e){ setMsg({type:"error", text:e.message}); }
    setLoading(false);
  }

  async function saveEmail(){
    if(!newEmail.trim()){ return; }
    setLoading(true); setMsg(null);
    try{
      await reauth(currentPwd);
      await window.fbVerifyBeforeUpdateEmail(currentUser, newEmail.trim());
      setMsg({type:"success", text:L.emailSent});
      setNewEmail(""); setCurrentPwd("");
    }catch(e){
      const msgs={"auth/wrong-password":"Senha atual incorreta.","auth/invalid-credential":"Senha atual incorreta.","auth/invalid-email":"Email inválido."};
      setMsg({type:"error", text:msgs[e.code]||e.message});
    }
    setLoading(false);
  }

  async function savePassword(){
    setMsg(null);
    if(newPwd!==confirmPwd){ setMsg({type:"error",text:L.pwdMismatch}); return; }
    if(newPwd.length<6){ setMsg({type:"error",text:L.pwdShort}); return; }
    setLoading(true);
    try{
      await reauth(currentPwd);
      await window.fbUpdatePassword(currentUser, newPwd);
      setCurrentPwd(""); setNewPwd(""); setConfirmPwd("");
      setMsg({type:"success", text:L.success});
    }catch(e){
      const msgs={"auth/wrong-password":"Senha atual incorreta.","auth/invalid-credential":"Senha atual incorreta."};
      setMsg({type:"error", text:msgs[e.code]||e.message});
    }
    setLoading(false);
  }

  const iS={width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:12,color:C.text,padding:"14px 18px",fontSize:16,outline:"none",fontFamily:"\'Barlow Condensed\',sans-serif",boxSizing:"border-box"};

              }
              <div style={{position:"absolute",bottom:0,right:0,width:24,height:24,borderRadius:"50%",background:"#22C55E",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,border:`2px solid ${C.card}`}}>
                {photoUploading ? "⟳" : "📷"}

            </div>
            <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>uploadPhoto(e.target.files?.[0])}/>

              <div style={{fontSize:15,color:C.muted,marginTop:3}}>{currentUser?.displayName||currentUser?.email}</div>

        </div>

        {/* ── TABS ── */}
        <div style={{display:"flex",gap:6,padding:"24px 36px 0"}}>
          {[["profile","👤 "+L.profileTab],["security","🔒 "+L.securityTab]].map(([t,l])=>(
            <button key={t} onClick={()=>{setTab(t);setMsg(null);setCurrentPwd("");}} style={{padding:"9px 20px",borderRadius:10,border:"none",background:tab===t?"linear-gradient(135deg,#22C55E,#3b82f6)":"transparent",color:tab===t?"#fff":C.muted,fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer",transition:"all 0.2s"}}>

        </div>

        <div style={{padding:"24px 36px 36px",display:"flex",flexDirection:"column",gap:18}}>

          {/* ── PROFILE TAB ── */}

            </div>
            <div>
              <label style={labelS}>{L.email}</label>
              <input value={currentUser?.email||""} disabled style={{...iS,opacity:0.45,cursor:"not-allowed"}}/>

              {loading?"⏳...":L.save}
            </button>
          </>)}

          {/* ── SECURITY TAB ── */}
          {tab==="security"&&(<>
            {/* Change email section */}
            <div style={{background:C.panel,borderRadius:14,padding:"16px 18px",border:`1px solid ${C.border}`}}>
              <div style={{fontSize:15,fontWeight:800,color:C.text,marginBottom:12}}>📧 {L.newEmail}</div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div>
                  <label style={labelS}>{L.newEmail}</label>

                  </div>
                </div>
                <div>
                  <label style={labelS}>{L.newPwd}</label>
                  <div style={{position:"relative"}}>
                    <input type={showNew?"text":"password"} value={newPwd} onChange={e=>setNewPwd(e.target.value)} style={iS}/>
                    <button onClick={()=>setShowNew(s=>!s)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:16}}>{showNew?"🙈":"👁️"}</button>
                  </div>
                </div>
                <div>
                  <label style={labelS}>{L.confirmPwd}</label>
                  <input type="password" value={confirmPwd} onChange={e=>setConfirmPwd(e.target.value)} style={{...iS,borderColor:confirmPwd&&confirmPwd!==newPwd?"#ef4444":C.border}}/>
                </div>
                <button onClick={savePassword} disabled={loading||!currentPwd||!newPwd||!confirmPwd} style={{background:loading||!currentPwd||!newPwd||!confirmPwd?"#1E293B":"linear-gradient(135deg,#22C55E,#3b82f6)",color:"#fff",border:"none",borderRadius:10,padding:"11px",fontFamily:"inherit",fontWeight:700,cursor:loading||!currentPwd||!newPwd||!confirmPwd?"not-allowed":"pointer",fontSize:15,opacity:loading||!currentPwd||!newPwd||!confirmPwd?0.5:1}}>
                  {loading?"⏳...":L.save}
                </button>
              </div>
            </div>
          </>)}

          {/* Sign out */}
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14}}>
            <button onClick={onLogout} style={{width:"100%",background:"none",border:`1px solid ${C.border}`,borderRadius:12,padding:"12px",fontFamily:"inherit",fontWeight:700,cursor:"pointer",fontSize:15,color:C.muted,display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"border-color 0.2s"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="#ef4444"}
              onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}
            >
              ⏻ {L.logout}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}


class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state={hasError:false,error:null}; }
  static getDerivedStateFromError(e){ return {hasError:true,error:e}; }
  componentDidCatch(e,info){ console.error("React error:",e,info); }
  render(){
    if(this.state.hasError){
      return (
        <div style={{minHeight:"100vh",background:"#0f1117",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,fontFamily:"'Barlow Condensed',sans-serif",color:"#fff",padding:20}}>
          <div style={{fontSize:48}}>⚠️</div>
          <div style={{fontSize:24,fontWeight:800}}>Something went wrong</div>
          <div style={{fontSize:14,color:"#475569",maxWidth:400,textAlign:"center"}}>{this.state.error?.message||"Unknown error"}</div>
          <button onClick={()=>window.location.reload()} style={{marginTop:8,background:"linear-gradient(135deg,#22C55E,#3b82f6)",color:"#fff",border:"none",borderRadius:10,padding:"12px 28px",fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
            🔄 Reload App
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

        const loadedTrades = tradesSnap.docs.map(d=>({...d.data(),_docId:d.id}));

        // Migração: corrige gamma levels com nomes inválidos
        const validSet = new Set(GAMMA_LEVELS);
        const badNameMap = {
          "Weekly Call Wall":"Call Resistance","ODTE Call Wall":"Call Resistance 0DTE",
          "0DTE Call Wall":"Call Resistance 0DTE","Weekly Put Wall":"Put Support",
          "ODTE Put Wall":"Put Support 0DTE","0DTE Put Wall":"Put Support 0DTE",
          "Key Strike":"HVL","Daily Max":"1D Max","Daily Min":"1D Min",
        };
        for(const t of loadedTrades){
          if(!Array.isArray(t.gammaLevels)) continue;
          const fixed = t.gammaLevels.map(g=> validSet.has(g) ? g : (badNameMap[g]||null)).filter(Boolean);
          const hasInvalid = t.gammaLevels.some(g=>!validSet.has(g));
          if(hasInvalid && t._docId){
            try{ await window.fsUpdateDoc(window.fsDoc(window.db,`users/${currentUser?.uid}/trades`,t._docId),{gammaLevels:fixed}); }catch(e){}
            t.gammaLevels = fixed;
          }
        }

        setTrades(loadedTrades.sort((a,b)=>new Date(b.date)-new Date(a.date)));

        // Load settings
        const settingsSnap = await window.fsGetDocs(window.fsCollection(window.db,`users/${currentUser?.uid}/settings`));

          const data=d.data();

          }
        });
      }catch(e){console.error("Load error:",e);}
      finally{ setLoading(false); }
    }
    load();

    let r=trades.filter(t=>{
      if(filterSymbol!=="All"&&t.symbol!==filterSymbol) return false;
      if(filterStrategy!=="All"&&t.strategy!==filterStrategy) return false;
      if(advFilters.dateFrom&&t.date<advFilters.dateFrom) return false;
      if(advFilters.dateTo&&t.date>advFilters.dateTo) return false;
      if(advFilters.strategyFollowed!=="All"&&t.strategyFollowed!==advFilters.strategyFollowed) return false;
      if(advFilters.hasPartial1&&t.partialType!=="Partial 1"&&t.partialType!=="Both") return false;
      if(advFilters.hasPartial2&&t.partialType!=="Both") return false;
      if(advFilters.onlyWins&&t.actualPnl<=0) return false;
      if(advFilters.onlyLosses&&t.actualPnl>=0) return false;
      if(advFilters.gammaLevels.length>0){
        const tg=Array.isArray(t.gammaLevels)?t.gammaLevels:(t.gammaLevel?[t.gammaLevel]:[]);
        if(!advFilters.gammaLevels.some(g=>tg.includes(g))) return false;

      await Promise.all(snapshot.docs.map(d=>window.fsDeleteDoc(window.fsDoc(window.db,`users/${uid}/trades`,d.id))));
      setTrades([]);
    }catch(e){console.error("clear error",e); setTrades([]);}
    finally{ seedingRef.current = false; setSeeding(false); }
  }

  async function seedDemoData(){
    if(seedingRef.current) return;
    const uid = currentUser?.uid;
    if(!uid){ return; }
    seedingRef.current = true; setSeeding(true);
    try{
      const snapshot = await window.fsGetDocs(window.fsCollection(window.db,`users/${uid}/trades`));
      await Promise.all(snapshot.docs.map(d=>window.fsDeleteDoc(window.fsDoc(window.db,`users/${uid}/trades`,d.id))));
    }catch(e){console.error("clear error",e);}

    const symbols=["NQ","ES","CL","GC","RTY","YM","NG","SI"];
    const strategies=["ORB","VWAP Fade","Gamma Level","ICT SMC","Supply/Demand","Momentum","Mean Reversion","Breakout Retest"];
    const psychologies=[
      "Feeling extremely confident today, had a clear read on the market structure and trusted my levels completely. No hesitation on entry.",
      "Woke up anxious — lots of news overnight. I was jumpy on the trigger and almost exited before my target. Managed to hold but it was uncomfortable.",
      "Very calm and patient. Waited over an hour for the setup to confirm before entering. This is exactly the mental state I want every session.",
      "Tired from poor sleep. My reaction time felt slow and I second-guessed my read twice. I probably should have sat out today.",
      "Felt impulsive — I was frustrated from missing the earlier move and chased this entry 8 ticks late. Knew it was wrong as I clicked.",
      "Completely mechanical today. No emotion, just followed the rules. Didn't feel attached to the outcome either way.",
      "Overconfident after a 3-day winning streak. Sized up to 8 contracts when my normal is 4. The win felt lucky, not earned.",
      "Dealing with family stress all morning. I kept checking my phone and couldn't stay focused on price action. Should have skipped.",
      "Sharp and locked in. Pre-market prep paid off — I had my key levels marked and just waited for price to come to me.",
      "Felt greedy after seeing the move I missed. Entered without a clear stop in mind, was just hoping it would keep going.",
      "Bit nervous going into the Fed announcement but managed the position well. Reduced size to 2 contracts which helped me stay calm.",
      "In the zone — flow state. Every decision felt natural and effortless. I knew exactly what the market was doing.",
      "Mildly distracted, had meetings before the session. Felt behind mentally, like I was always one step slow in my analysis.",
      "Revenge trading after yesterday's loss. I knew it but couldn't stop myself. Entered aggressively and without patience.",
      "Very disciplined today despite a difficult morning with a stop-out. Reset mentally, came back focused and took a clean second setup.",
      "Euphoric after yesterday. I felt untouchable which scared me. Kept second-guessing whether to take profits too early.",
      "Calm but cautious — lower confidence than usual. Took reduced size and was okay with a smaller winner. Controlled the risk well.",
      "Extremely frustrated mid-session after a false breakout stopped me out. Had to step away for 20 minutes before re-entering.",
      "Solid mental state, pre-planned everything the night before. No surprises, just execution. Felt professional.",
      "Anxious about a personal financial situation outside of trading. Hard to separate it from my decision-making at the desk.",
    ];
    const gammaOpts=GAMMA_LEVELS;
    function rnd(min,max){return min+Math.random()*(max-min);}
    function rndInt(min,max){return Math.floor(rnd(min,max+1));}
    function pickArr(arr){return arr[rndInt(0,arr.length-1)];}
    function fmtHour(h,m){return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;}

    // Base prices per symbol
    const bases={NQ:18500,ES:5200,CL:78,GC:2340,RTY:2040,YM:38500,NG:2.1,SI:27};
    const ticks={NQ:0.25,ES:0.25,CL:0.01,GC:0.10,RTY:0.10,YM:1,NG:0.001,SI:0.005};
    const mults={NQ:20,ES:50,CL:1000,GC:100,RTY:10,YM:5,NG:10000,SI:5000};

    const demoPnls=[820,-340,1240,560,-180,940,1680,-420,320,1100,
                    -250,780,2200,-680,440,1560,-120,890,1340,-380,
                    620,1980,-290,740,1120,-460,980,1640,540,-220];

    const added=[];
    for(let i=0;i<30;i++){
      const daysAgo=Math.floor(i/2)+Math.floor(i%3);
      const d=new Date(); d.setDate(d.getDate()-daysAgo);
      const dateStr=d.toISOString().split("T")[0];
      const sym=pickArr(symbols);
      const dir=Math.random()>0.42?"Long":"Short";
      const base=bases[sym];
      const tick=ticks[sym];
      const mult=mults[sym];
      const contracts=rndInt(1,6);
      const ep=parseFloat((base+rnd(-base*0.003,base*0.003)).toFixed(2));
      const stopDist=rnd(base*0.001,base*0.004);
      const sp=dir==="Long"?parseFloat((ep-stopDist).toFixed(2)):parseFloat((ep+stopDist).toFixed(2));
      const tgtDist=stopDist*rnd(1.5,3.5);
      const tp=dir==="Long"?parseFloat((ep+tgtDist).toFixed(2)):parseFloat((ep-tgtDist).toFixed(2));
      const pnl=demoPnls[i];
      const ptgt=parseFloat((Math.abs(pnl)*rnd(0.8,1.3)).toFixed(0));
      const entryH=rndInt(9,14); const exitH=entryH+rndInt(0,3);
      const glevels=Math.random()>0.5?[pickArr(gammaOpts)]:[];
      const stratFollowed=pnl>0?(Math.random()>0.1?"Yes":"No"):(Math.random()>0.5?"Yes":"No");
      const trade={
        tradeN:i+1, date:dateStr, symbol:sym, direction:dir, contracts,
        entryHour:fmtHour(entryH,rndInt(0,59)), exitHour:fmtHour(exitH,rndInt(0,59)),
        strategy:pickArr(strategies), gammaLevels:glevels,
        entryPrice:ep, targetPrice:tp, stopPrice:sp,
        partialType:(()=>{const r=Math.random();return r>0.65?"Both":r>0.35?"Partial 1":"None";})(),
        partial1Price:parseFloat((ep*(1+rnd(0.001,0.003))).toFixed(2)), partial1Contracts:Math.max(1,Math.floor(contracts/2)), partial1Hit:Math.random()>0.4?"Yes":"No",
        partial2Price:parseFloat((ep*(1+rnd(0.003,0.006))).toFixed(2)), partial2Contracts:Math.max(1,Math.floor(contracts/3)), partial2Hit:Math.random()>0.6?"Yes":"No",
        finalTargetPrice:tp, finalTargetHit:pnl>ptgt*0.9?"Yes":"No",
        actualFinalLevel:"", profitTarget:ptgt, actualPnl:pnl,
        strategyFollowed:stratFollowed, stopRespected:pnl>0?(Math.random()>0.15?"Yes":"No"):(Math.random()>0.45?"Yes":"No"), psychology:pickArr(psychologies),
        comments:pnl>0?"Clean setup, executed well.":"Need to review entry timing.",
        chartImage:"",
      };
      try{
        const ref=await window.fsAddDoc(window.fsCollection(window.db,`users/${uid}/trades`),trade);
        added.push({...trade,_docId:ref.id});
      }catch(e){console.error(e);}
    }
    if(added.length>0) setTrades([...added].sort((a,b)=>new Date(b.date)-new Date(a.date)));
    else setTrades([]);
    seedingRef.current = false; setSeeding(false);
  }

          const SortBtn=({field,label})=>{
            const active=sortField===field;
            return <button onClick={()=>{if(active)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortField(field);setSortDir("desc");}}} style={{padding:"6px 14px",borderRadius:8,fontSize:13,fontWeight:700,border:`1px solid ${active?C.accent:C.border}`,color:active?"#fff":C.muted,background:active?C.accent:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:"inherit"}}>
              {label} {active?(sortDir==="desc"?"↓":"↑"):"↕"}
            </button>;
          };
          return <div style={{marginBottom:16}}>
            {/* Row 1: Symbol + Strategy chips + Sort + Filter btn */}
            <div className="filter-bar" style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",padding:"10px 16px",background:C.panel,border:`1px solid ${C.border}`,borderRadius:showAdvFilter?"14px 14px 0 0":"14px"}}>
              <span style={{fontSize:14,color:C.muted,fontWeight:700}}>{T.thSymbol||"Símbolo"}</span>
              {symbols.map(s=>(<button key={s} className="chip-btn" onClick={()=>setFilterSymbol(s)} style={{padding:"5px 14px",borderRadius:20,fontSize:14,fontWeight:700,border:`1px solid ${filterSymbol===s?C.accent:C.border}`,color:filterSymbol===s?"#fff":C.muted,background:filterSymbol===s?C.accent:"none"}}>{s==="All"?(T.filterAll||"All"):s}</button>))}
              <div style={{width:1,background:C.border,height:16,margin:"0 4px"}}/>
              <span style={{fontSize:14,color:C.muted,fontWeight:700}}>{T.thStrategy||"Estratégia"}</span>
              {usedStrategies.map(s=>(<button key={s} className="chip-btn" onClick={()=>setFilterStrategy(s)} style={{padding:"5px 14px",borderRadius:20,fontSize:14,fontWeight:700,border:`1px solid ${filterStrategy===s?C.purple:C.border}`,color:filterStrategy===s?"#fff":C.muted,background:filterStrategy===s?C.purple:"none"}}>{s==="All"?(T.filterAll||"All"):s}</button>))}
              <div style={{flex:1}}/>
              {tab==="trades"&&<><SortBtn field="tradeN" label="#"/><SortBtn field="date" label={T.thDate||"Data"}/><SortBtn field="pnl" label="PnL"/><SortBtn field="rating" label="⭐"/><div style={{width:1,background:C.border,height:16,margin:"0 2px"}}/></>}
              {/* Advanced filter button */}
              <button onClick={()=>setShowAdvFilter(v=>!v)} style={{padding:"6px 14px",borderRadius:8,fontSize:13,fontWeight:700,border:`1px solid ${advActive?C.amber:showAdvFilter?C.accent:C.border}`,color:advActive?C.amber:showAdvFilter?"#fff":C.muted,background:showAdvFilter?C.accent:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontFamily:"inherit"}}>
                ⚙ Filtros {advActive?<span style={{background:C.amber,color:"#000",borderRadius:"50%",width:16,height:16,fontSize:11,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>{[advFilters.dateFrom,advFilters.dateTo,advFilters.strategyFollowed!=="All",advFilters.hasPartial1,advFilters.hasPartial2,advFilters.onlyWins,advFilters.onlyLosses,advFilters.direction!=="All",advFilters.minRating>0].filter(Boolean).length+advFilters.gammaLevels.length+advFilters.strategies.length}</span>:null}
              </button>
              {advActive&&<button onClick={resetAdv} style={{padding:"6px 10px",borderRadius:8,fontSize:12,fontWeight:700,border:`1px solid ${C.red}`,color:C.red,background:"none",cursor:"pointer",fontFamily:"inherit"}}>✕ Limpar</button>}
              <span style={{fontSize:13,color:C.muted}}>{filtered.length} {T.tradeCount?T.tradeCount(1).replace("1 ",""):""}</span>
            </div>
            {/* Row 2: Advanced filter panel */}
            {showAdvFilter&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderTop:"none",borderRadius:"0 0 14px 14px",padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}}>
              {/* Date range */}
              <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontSize:13,color:C.muted,fontWeight:700,minWidth:80}}>Período</span>
                <input type="date" value={advFilters.dateFrom} onChange={e=>setAdvFilters(f=>({...f,dateFrom:e.target.value}))} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 10px",color:C.text,fontSize:13,fontFamily:"inherit"}}/>
                <span style={{color:C.muted,fontSize:13}}>→</span>
                <input type="date" value={advFilters.dateTo} onChange={e=>setAdvFilters(f=>({...f,dateTo:e.target.value}))} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 10px",color:C.text,fontSize:13,fontFamily:"inherit"}}/>
              </div>
              {/* Direction + Result + Strategy Followed + Partials */}
              <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:13,color:C.muted,fontWeight:700,minWidth:80}}>Direção</span>
                {["All","Long","Short"].map(d=><button key={d} onClick={()=>setAdvFilters(f=>({...f,direction:d}))} style={{padding:"5px 14px",borderRadius:20,fontSize:13,fontWeight:700,border:`1px solid ${advFilters.direction===d?(d==="Long"?C.green:d==="Short"?C.red:C.accent):C.border}`,color:advFilters.direction===d?"#fff":C.muted,background:advFilters.direction===d?(d==="Long"?C.green:d==="Short"?C.red:C.accent):"none",cursor:"pointer",fontFamily:"inherit"}}>{d==="All"?(T.filterAll||"Todos"):d}</button>)}
                <div style={{width:1,background:C.border,height:16,margin:"0 4px"}}/>
                <span style={{fontSize:13,color:C.muted,fontWeight:700}}>Resultado</span>
                <button onClick={()=>setAdvFilters(f=>({...f,onlyWins:!f.onlyWins,onlyLosses:false}))} style={{padding:"5px 14px",borderRadius:20,fontSize:13,fontWeight:700,border:`1px solid ${advFilters.onlyWins?C.green:C.border}`,color:advFilters.onlyWins?"#fff":C.muted,background:advFilters.onlyWins?C.green:"none",cursor:"pointer",fontFamily:"inherit"}}>✓ Lucro</button>
                <button onClick={()=>setAdvFilters(f=>({...f,onlyLosses:!f.onlyLosses,onlyWins:false}))} style={{padding:"5px 14px",borderRadius:20,fontSize:13,fontWeight:700,border:`1px solid ${advFilters.onlyLosses?C.red:C.border}`,color:advFilters.onlyLosses?"#fff":C.muted,background:advFilters.onlyLosses?C.red:"none",cursor:"pointer",fontFamily:"inherit"}}>✗ Perda</button>
                <div style={{width:1,background:C.border,height:16,margin:"0 4px"}}/>
                <span style={{fontSize:13,color:C.muted,fontWeight:700}}>Estratégia Seguida</span>
                {["All","Yes","No"].map(v=><button key={v} onClick={()=>setAdvFilters(f=>({...f,strategyFollowed:v}))} style={{padding:"5px 14px",borderRadius:20,fontSize:13,fontWeight:700,border:`1px solid ${advFilters.strategyFollowed===v?C.accent:C.border}`,color:advFilters.strategyFollowed===v?"#fff":C.muted,background:advFilters.strategyFollowed===v?C.accent:"none",cursor:"pointer",fontFamily:"inherit"}}>{v==="All"?(T.filterAll||"Todos"):v==="Yes"?"Sim":"Não"}</button>)}
                <div style={{width:1,background:C.border,height:16,margin:"0 4px"}}/>
                <span style={{fontSize:13,color:C.muted,fontWeight:700}}>Parciais</span>
                <button onClick={()=>setAdvFilters(f=>({...f,hasPartial1:!f.hasPartial1}))} style={{padding:"5px 14px",borderRadius:20,fontSize:13,fontWeight:700,border:`1px solid ${advFilters.hasPartial1?C.purple:C.border}`,color:advFilters.hasPartial1?"#fff":C.muted,background:advFilters.hasPartial1?C.purple:"none",cursor:"pointer",fontFamily:"inherit"}}>P1</button>
                <button onClick={()=>setAdvFilters(f=>({...f,hasPartial2:!f.hasPartial2}))} style={{padding:"5px 14px",borderRadius:20,fontSize:13,fontWeight:700,border:`1px solid ${advFilters.hasPartial2?C.purple:C.border}`,color:advFilters.hasPartial2?"#fff":C.muted,background:advFilters.hasPartial2?C.purple:"none",cursor:"pointer",fontFamily:"inherit"}}>P1+P2</button>
              </div>
              {/* Strategies multi-select */}
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontSize:13,color:C.muted,fontWeight:700,minWidth:80}}>Estratégias</span>
                {strategies.filter(Boolean).map(s=><button key={s} onClick={()=>toggleStr(s)} style={{padding:"5px 14px",borderRadius:20,fontSize:13,fontWeight:700,border:`1px solid ${advFilters.strategies.includes(s)?C.purple:C.border}`,color:advFilters.strategies.includes(s)?"#fff":C.muted,background:advFilters.strategies.includes(s)?C.purple:"none",cursor:"pointer",fontFamily:"inherit"}}>{s}</button>)}
              </div>
              {/* Gamma levels multi-select */}
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontSize:13,color:C.muted,fontWeight:700,minWidth:80}}>Gamma</span>
                {GAMMA_LEVELS.map(g=><button key={g} onClick={()=>toggleGL(g)} style={{padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:700,border:`1px solid ${advFilters.gammaLevels.includes(g)?C.amber:C.border}`,color:advFilters.gammaLevels.includes(g)?"#000":C.muted,background:advFilters.gammaLevels.includes(g)?C.amber:"none",cursor:"pointer",fontFamily:"inherit"}}>{g}</button>)}
              </div>
              {/* Star rating filter */}
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontSize:13,color:C.muted,fontWeight:700,minWidth:80}}>{T.filterRating||"Avaliação"}</span>
                {[0,1,2,3,4,5].map(n=>{
                  const isActive = advFilters.minRating===n;
                  const isTodos = n===0;
                  return (
                    <button key={n} onClick={()=>setAdvFilters(f=>({...f,minRating:f.minRating===n&&n>0?0:n}))}
                      style={{padding:"5px 12px",borderRadius:20,fontSize:13,fontWeight:700,
                        border:`1px solid ${isActive?(isTodos?C.accent:C.amber):C.border}`,
                        color:isActive?(isTodos?"#fff":"#000"):C.muted,
                        background:isActive?(isTodos?C.accent:C.amber):"none",cursor:"pointer",fontFamily:"inherit"}}>
                      {isTodos?(T.filterAll||"Todos"):`${"★".repeat(n)}${"☆".repeat(5-n)}`}
                    </button>
                  );
                })}
              </div>
            </div>}
          </div>;
        })()}

        {/* DASHBOARD */}
        {tab==="dashboard" && (
          <div className="fade-in" style={{flex:1,display:"flex",flexDirection:"column",gap:12}}>
            <div className="metric-grid" style={{display:"grid",gap:10}}>
              {[
                {label:T.totalPnl,value:fmt(metrics.totalPnl),color:pnlColor(metrics.totalPnl),sub:`${metrics.totalTrades} trades`},
                {label:T.winRate,value:metrics.winRate.toFixed(1)+"%",color:metrics.winRate>=50?C.green:C.red,sub:`${filtered.filter(t=>t.actualPnl>0).length}W / ${filtered.filter(t=>t.actualPnl<0).length}L`},
                {label:T.profitFactor,value:metrics.profitFactor.toFixed(2)+"x",color:metrics.profitFactor>=1.5?C.green:metrics.profitFactor>=1?C.amber:C.red,sub:T.grossProfit},
                {label:T.maxDrawdown,value:"−$"+metrics.maxDrawdown.toFixed(0),color:C.red,sub:T.peakTrough},
                {label:T.avgWin,value:fmt(metrics.avgWin),color:C.green,sub:T.perWin},
                {label:T.avgLoss,value:"−$"+metrics.avgLoss.toFixed(0),color:C.red,sub:T.perLoss},
                {label:T.avgRating||"Avaliação Média",value:metrics.avgRating>0?("★".repeat(Math.round(metrics.avgRating))+"☆".repeat(5-Math.round(metrics.avgRating))):"—",color:C.amber,sub:metrics.avgRating>0?`${metrics.avgRating.toFixed(1)}/5.0`:(T.noData||"Sem dados"),starDisplay:true},
                {label:T.bestStrategy,value:metrics.bestStrategy||"—",color:C.accent,sub:T.byTotalPnl,small:true},
              ].map(m=>(
                <div key={m.label} className="metric-card" style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:"24px 26px",flex:1}}>
                  <div style={{fontSize:16,color:C.muted,fontWeight:600,marginBottom:10}}>{m.label}</div>
                  {m.starDisplay
                    ?<div style={{fontSize:28,lineHeight:1,marginBottom:6,letterSpacing:2,color:m.color}}>{m.value}</div>
                    :<div style={{fontSize:m.small?26:42,fontWeight:800,color:m.color,lineHeight:1,marginBottom:6,fontFamily:"'Barlow Condensed', sans-serif",letterSpacing:"-0.01em"}}>{m.value}</div>
                  }
                  <div style={{fontSize:15,color:C.muted}}>{m.sub}</div>
                </div>
              ))}
            </div>

            {/* DISCIPLINE SCORE WIDGET */}
            {(()=>{
              const ds=metrics.disciplineScore;
              const dsColor=ds>=80?C.green:ds>=60?C.amber:C.red;
              const planPct=metrics.stratFollowedRate;
              const ratedTrades=filtered.filter(t=>t.tradeRating>0);
              const ratingPct=ratedTrades.length?(ratedTrades.reduce((s,t)=>s+(t.tradeRating||0),0)/ratedTrades.length/5)*100:null;
              const stopRespTrades=filtered.filter(t=>t.stopRespected!==undefined&&t.stopRespected!==null&&t.stopRespected!=="");
              const stopPct=stopRespTrades.length ? stopRespTrades.filter(t=>t.stopRespected==="Yes").length/stopRespTrades.length*100 : (()=>{const lossArr=filtered.filter(t=>t.actualPnl<0);if(lossArr.length===0)return 100;const bad=lossArr.filter(t=>{const stop=parseFloat(t.stopPrice)||0,entry=parseFloat(t.entryPrice)||0,contracts=parseFloat(t.contracts)||1;const maxL=stop>0&&entry>0?Math.abs(stop-entry)*contracts*50:0;return maxL>0&&Math.abs(t.actualPnl)>maxL*1.15;});return Math.max(0,100-(bad.length/lossArr.length)*100);})();
              const pillars=[
                {label:T.discPlan||"Plano Seguido",pct:planPct,color:planPct>=80?C.green:planPct>=60?C.amber:C.red},
                {label:T.discStop||"Stop Respeitado",pct:stopPct,color:stopPct>=80?C.green:stopPct>=60?C.amber:C.red},
                {label:T.discRating||"Avaliação",pct:ratingPct,color:ratingPct!=null?(ratingPct>=70?C.green:ratingPct>=50?C.amber:C.red):C.muted,noData:ratingPct==null},
              ];
              return (
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:"22px 26px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
                    <div>
                      <div style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:4}}>{T.disciplineScore||"Score de Disciplina"}</div>
                      <div style={{fontSize:13,color:C.muted}}>{T.discPlan||"Plano"} · {T.discStop||"Stop"} · {T.discRating||"Avaliação"}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:52,fontWeight:900,color:dsColor,fontFamily:"'Barlow Condensed',sans-serif",lineHeight:1}}>{ds}<span style={{fontSize:24,opacity:0.6}}>/100</span></div>
                      <div style={{fontSize:13,fontWeight:700,color:dsColor,marginTop:2}}>{ds>=80?"🏆 Excelente":ds>=60?"👍 Bom":"⚠️ Melhorar"}</div>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16}}>
                    {pillars.map(p=>(
                      <div key={p.label}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                          <span style={{fontSize:13,color:C.muted,fontWeight:600}}>{p.label}</span>
                          <span style={{fontSize:13,fontWeight:800,color:p.noData?C.muted:p.color}}>{p.noData?"—":p.pct.toFixed(0)+"%"}</span>
                        </div>
                        <div style={{height:8,background:C.border,borderRadius:4,overflow:"hidden"}}>
                          <div style={{height:"100%",width:(p.noData?0:p.pct)+"%",background:p.noData?C.border:p.color,borderRadius:4,transition:"width 0.6s ease"}}/>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}

            <div className="dashboard-charts-grid" style={{display:"grid",gap:10,flex:1}}>
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:22,display:"flex",flexDirection:"column"}}>
                <div style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:16}}>{T.equityCurve}</div>
                <div style={{flex:1,minHeight:160}}><SimpleLineChart data={equityCurve} height={200} T={T}/></div>
              </div>
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:22}}>
                <div style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:16}}>{T.pnlByDay}</div>
                <SimpleBarChart data={pnlByDay} height={180} T={T}/>
              </div>
            </div>
            <PsychologyAI trades={filtered} C={C} lang={lang}/>
          </div>
        )}

        {/* TRADES */}
        {tab==="trades" && (
          <div style={{flex:1,display:'flex',flexDirection:'column'}} className="fade-in table-scroll-wrap" style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,overflow:"auto",flex:1}}>

            {/* Bulk delete bar */}
            {selectedTrades.size>0 && (
              <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 20px",background:"#ef444415",borderBottom:`1px solid #ef444430`,position:"sticky",top:0,zIndex:10}}>
                <div style={{width:22,height:22,borderRadius:6,background:C.red,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#fff",fontWeight:800}}>{selectedTrades.size}</div>
                <span style={{fontSize:15,fontWeight:700,color:C.red}}>{selectedTrades.size} trade{selectedTrades.size!==1?"s":""} selected</span>
                <button onClick={()=>setConfirmBulkDelete(true)} style={{marginLeft:4,background:"#ef4444",color:"#fff",border:"none",borderRadius:8,padding:"7px 18px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>
                  🗑️ Delete selected
                </button>
                <button onClick={()=>setSelectedTrades(new Set())} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,padding:"7px 14px",fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>
                  Cancel
                </button>
              </div>
            )}

            <table style={{width:"100%",borderCollapse:"collapse",fontSize:19,minWidth:1300}}>
              <thead>
                <tr style={{borderBottom:`1px solid ${C.border}`,background:C.panel}}>
                  {/* Select all checkbox */}
                  <th style={{padding:"16px 8px 16px 20px",width:36}}>
                    <div onClick={toggleSelectAll} style={{width:20,height:20,borderRadius:5,border:`2px solid ${selectedTrades.size===filtered.length&&filtered.length>0?C.accent:C.border}`,background:selectedTrades.size===filtered.length&&filtered.length>0?C.accent:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>
                      {selectedTrades.size===filtered.length&&filtered.length>0&&<span style={{fontSize:12,color:"#fff",fontWeight:900}}>✓</span>}
                      {selectedTrades.size>0&&selectedTrades.size<filtered.length&&<span style={{fontSize:10,color:C.accent,fontWeight:900}}>—</span>}
                    </div>
                  </th>
                  {[
                    {h:T.thNum||"#",sf:"tradeN"},{h:T.thDate||"Date",sf:"date"},{h:T.thSymbol||"Symbol"},{h:T.thDir||"Dir."},{h:T.thLots||"Lots"},{h:T.thEntry||"Entry"},{h:T.thExit||"Exit"},{h:T.thStrategy||"Strategy"},{h:T.thGamma||"Gamma"},{h:T.thEntryD||"Entry$"},{h:T.thTargetD||"Target$"},{h:T.thStopD||"Stop$"},{h:"P1"},{h:"P2"},{h:T.thActualPnl||"Actual PnL",sf:"pnl"},{h:T.thPsych||"Psych"},{h:T.thStrat||"Strat?"},{h:"⭐",sf:"rating"},{h:""}
                  ].map(({h,sf})=>(
                    <th key={h} onClick={sf?()=>{if(sortField===sf)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortField(sf);setSortDir("desc");}}:undefined} style={{padding:"16px 16px",textAlign:"left",fontSize:14,color:sf&&sortField===sf?C.accent:C.muted,fontWeight:700,whiteSpace:"nowrap",textTransform:"uppercase",letterSpacing:"0.05em",cursor:sf?"pointer":"default",userSelect:"none"}}>
                      {h}{sf&&sortField===sf?(sortDir==="desc"?" ↓":" ↑"):""}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map(t=>(
                  <React.Fragment key={t._docId||t.id}>
                    <tr className="tr-row" style={{borderBottom:`1px solid ${C.border}`,cursor:"pointer",background:selectedTrades.has(t._docId)?"#22C55E15":expandedRow===t._docId?C.card:"transparent",transition:"background 0.15s"}} onClick={()=>setExpandedRow(expandedRow===t._docId?null:t._docId)}>
                      {/* Checkbox */}
                      <td style={{padding:"18px 8px 18px 20px"}} onClick={e=>toggleSelect(t._docId,e)}>
                        <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${selectedTrades.has(t._docId)?C.accent:C.border}`,background:selectedTrades.has(t._docId)?C.accent:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",flexShrink:0}}>
                          {selectedTrades.has(t._docId)&&<span style={{fontSize:12,color:"#fff",fontWeight:900}}>✓</span>}
                        </div>
                      </td>
                      <td style={{padding:"18px 16px",color:C.muted,fontSize:19}}>#{t.tradeN}</td>
                      <td style={{padding:"18px 16px",color:C.sub,fontSize:19}}>{t.date?.slice(5)?.replace("-","/")}</td>
                      <td style={{padding:"18px 16px"}}><span style={{fontWeight:800,fontSize:21,color:C.accent}}>{t.symbol}</span></td>
                      <td style={{padding:"18px 16px"}}><Tag color={t.direction==="Long"?C.green:C.red}>{t.direction==="Long"?"▲ Long":"▼ Short"}</Tag></td>
                      <td style={{padding:"18px 16px",color:C.text,fontSize:19}}>{t.contracts}</td>
                      <td style={{padding:"18px 16px",color:C.sub,fontSize:19}}>{t.entryHour}</td>
                      <td style={{padding:"18px 16px",color:C.sub,fontSize:19}}>{t.exitHour}</td>
                      <td style={{padding:"18px 16px"}}><Tag color={C.purple}>{t.strategy}</Tag></td>
                      <td style={{padding:"9px 10px"}}>
                        <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                          {(Array.isArray(t.gammaLevels)?t.gammaLevels:(t.gammaLevel?[t.gammaLevel]:[])).map(g=><Tag key={g} color={C.amber} small>{g}</Tag>)}
                        </div>
                      </td>
                      <td style={{padding:"18px 16px",color:C.text,fontSize:19}}>{t.entryPrice}</td>
                      <td style={{padding:"18px 16px",color:C.text,fontSize:19}}>{t.targetPrice}</td>
                      <td style={{padding:"18px 16px",color:C.text,fontSize:19}}>{t.stopPrice}</td>
                      <td style={{padding:"18px 16px"}}>

                    onDragLeave={e=>{e.currentTarget.style.borderColor=C.borderHi;}}
                    onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor=C.borderHi;const file=e.dataTransfer.files[0];if(file&&file.type.startsWith("image/")){const r=new FileReader();r.onload=ev=>setF("chartImage",ev.target.result);r.readAsDataURL(file);}}}>
                    <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const file=e.target.files[0];if(file){const r=new FileReader();r.onload=ev=>setF("chartImage",ev.target.result);r.readAsDataURL(file);}}}/>
                    <div style={{fontSize:24}}>📈</div>
                    <div style={{fontSize:11,color:C.muted}}>{T.fDropChart} <span style={{color:C.cyan}}>{T.fClickUpload}</span></div>
                    <div style={{fontSize:9,color:C.muted,letterSpacing:"0.08em"}}>PNG · JPG · WEBP</div>
                  </label>
                )}
              </div>
              <div style={{gridColumn:"1/-1"}}>
                <label style={lS}>{T.fComments}</label>
                <textarea value={form.comments} onChange={e=>setF("comments",e.target.value)} style={{...iS,height:72,resize:"none"}}/>
              </div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:24}}>
              <button onClick={handleSave} disabled={saving} style={{flex:1,background:saving?C.border:`linear-gradient(135deg,${C.accent},${C.purple})`,color:"#fff",border:"none",borderRadius:12,padding:"14px",fontFamily:"inherit",fontWeight:700,cursor:saving?"not-allowed":"pointer",fontSize:14}}>
                {saving?T.saving:T.saveTrade}
              </button>
              <button onClick={()=>{setShowForm(false);setEditTrade(null);}} style={{flex:1,background:"none",color:C.muted,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px",fontFamily:"inherit",cursor:"pointer",fontSize:14}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* MANAGE MODAL */}
      {showManage&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,backdropFilter:"blur(6px)",padding:20}}>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:24,padding:32,width:540,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 25px 60px rgba(0,0,0,0.6)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:3,height:20,background:C.cyan}}/>
                <span style={{fontSize:20,fontWeight:800}}>{T.manageLists}</span>
              </div>
              <button onClick={()=>setShowManage(false)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:20}}>✕</button>
            </div>
            <div style={{marginBottom:28}}>
              <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:14}}>{T.mSymbols}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
                {symbolsList.map(s=>(
                  <div key={s} style={{display:"flex",alignItems:"center",gap:6,background:C.panel,border:`1px solid ${C.border}`,borderRadius:3,padding:"5px 10px"}}>
                    <span style={{fontSize:11,fontWeight:700,color:C.cyan}}>{s}</span>
                    <button onClick={()=>saveSymbols(symbolsList.filter(x=>x!==s))} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:13,lineHeight:1,padding:0}}>×</button>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8}}>
                <input type="text" value={newSymbolInput} onChange={e=>setNewSymbolInput(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&addSymbol()} placeholder={T.mSymbolPlaceholder} style={{...iS,flex:1}}/>
                <button onClick={addSymbol} style={{background:C.cyan,color:"#000",border:"none",borderRadius:3,padding:"0 16px",fontWeight:700,cursor:"pointer",fontSize:10,whiteSpace:"nowrap",fontFamily:"inherit"}}>{T.mAdd}</button>
              </div>
            </div>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:14}}>{T.mStrategies}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
                {strategies.map(s=>(
                  <div key={s} style={{display:"flex",alignItems:"center",gap:6,background:C.panel,border:`1px solid ${C.border}`,borderRadius:3,padding:"5px 10px"}}>
                    <span style={{fontSize:11,color:C.text}}>{s}</span>
                    <button onClick={()=>saveStrategies(strategies.filter(x=>x!==s))} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:13,lineHeight:1,padding:0}}>×</button>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8}}>
                <input type="text" value={newStrategyInput} onChange={e=>setNewStrategyInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){const n=newStrategyInput.trim();if(n&&!strategies.includes(n)){saveStrategies([...strategies,n]);setNewStrategyInput("");}}}} placeholder={T.mStrategyPlaceholder} style={{...iS,flex:1}}/>
                <button onClick={()=>{const n=newStrategyInput.trim();if(n&&!strategies.includes(n)){saveStrategies([...strategies,n]);setNewStrategyInput("");}}} style={{background:C.purple,color:"#fff",border:"none",borderRadius:3,padding:"0 16px",fontWeight:700,cursor:"pointer",fontSize:10,whiteSpace:"nowrap",fontFamily:"inherit"}}>{T.mAdd}</button>
              </div>
            </div>
            <button onClick={()=>setShowManage(false)} style={{marginTop:24,width:"100%",background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:3,padding:10,cursor:"pointer",fontFamily:"inherit",fontSize:10,letterSpacing:"0.08em"}}>{T.mClose}</button>
          </div>
        </div>
      )}

      {/* ACCOUNT MODAL */}
      {showAccount&&(
        <AccountModal C={C} currentUser={currentUser} onClose={()=>setShowAccount(false)} onLogout={logout} lang={lang} userPhotoURL={userPhotoURL} onPhotoChange={setUserPhotoURL} userUsername={userUsername}/>
      )}

      {/* CONFIRM DELETE */}
      {confirmDelete&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,backdropFilter:"blur(6px)"}}>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:32,width:360,textAlign:"center",boxShadow:"0 25px 60px rgba(0,0,0,0.6)"}}>
            <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:8}}>{T.deleteTrade}</div>
            <div style={{fontSize:14,color:C.muted,marginBottom:24}}>{T.deleteCannotUndo}</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={confirmDeleteTrade} style={{flex:1,background:C.red,color:"#fff",border:"none",borderRadius:3,padding:"11px",fontFamily:"inherit",fontWeight:700,cursor:"pointer",fontSize:11,letterSpacing:"0.08em"}}>{T.deleteConfirm}</button>
              <button onClick={()=>setConfirmDelete(null)} style={{flex:1,background:"none",color:C.muted,border:`1px solid ${C.border}`,borderRadius:3,padding:"11px",fontFamily:"inherit",cursor:"pointer",fontSize:11}}>{T.deleteCancel}</button>
            </div>
          </div>
        </div>
      )}

      {/* CONFIRM BULK DELETE */}
      {confirmBulkDelete&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,backdropFilter:"blur(8px)"}}>
          <div style={{background:C.card,border:`1px solid #ef444440`,borderRadius:20,padding:36,width:400,textAlign:"center",boxShadow:"0 25px 60px rgba(0,0,0,0.7)"}}>
            <div style={{fontSize:40,marginBottom:12}}>🗑️</div>
            <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:8}}>Delete {selectedTrades.size} trades?</div>
            <div style={{fontSize:15,color:C.muted,marginBottom:28,lineHeight:1.5}}>This will permanently delete <span style={{color:C.red,fontWeight:700}}>{selectedTrades.size} trade{selectedTrades.size!==1?"s":""}</span>. This action cannot be undone.</div>
            <div style={{display:"flex",gap:12}}>
              <button onClick={bulkDelete} style={{flex:1,background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",border:"none",borderRadius:10,padding:"13px",fontFamily:"inherit",fontWeight:800,cursor:"pointer",fontSize:15,letterSpacing:"0.03em"}}>
                Yes, delete all
              </button>
              <button onClick={()=>setConfirmBulkDelete(false)} style={{flex:1,background:"none",color:C.muted,border:`1px solid ${C.border}`,borderRadius:10,padding:"13px",fontFamily:"inherit",cursor:"pointer",fontSize:15}}>
                Cancel
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
